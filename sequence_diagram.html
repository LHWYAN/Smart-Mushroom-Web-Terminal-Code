<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>模块交互时序图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Microsoft YaHei", "Noto Sans CJK SC", "WenQuanYi Micro Hei", sans-serif;
    background: #fff;
    display: flex;
    justify-content: center;
    padding: 30px 20px;
  }
  .diagram { width: 1150px; }
  .title-main {
    text-align: center;
    font-size: 20px;
    font-weight: 700;
    color: #1e293b;
    margin-bottom: 6px;
  }
  .subtitle {
    text-align: center;
    font-size: 12px;
    color: #64748b;
    margin-bottom: 24px;
  }

  /* 阶段标签 */
  .phase {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
    margin-top: 18px;
  }
  .phase-tag {
    font-size: 12px;
    font-weight: 700;
    padding: 4px 14px;
    border-radius: 6px;
    color: #fff;
    white-space: nowrap;
  }
  .phase-line {
    flex: 1;
    height: 1px;
    margin-left: 12px;
  }
  .p-init { background: #64748b; }
  .p-init + .phase-line { background: #cbd5e1; }
  .p-runtime { background: #3b82f6; }
  .p-runtime + .phase-line { background: #93c5fd; }
  .p-data { background: #06b6d4; }
  .p-data + .phase-line { background: #67e8f9; }

  /* 时序图容器 */
  .seq {
    position: relative;
    overflow-x: auto;
    padding: 10px 0 6px 0;
  }
  .seq-inner {
    position: relative;
    min-width: 1100px;
    height: auto;
  }

  /* 生命线头部 */
  .lifelines {
    display: flex;
    justify-content: space-between;
    margin-bottom: 0;
  }
  .ll {
    flex: 1;
    text-align: center;
    position: relative;
  }
  .ll-box {
    display: inline-block;
    border-radius: 8px;
    border: 2px solid;
    padding: 8px 10px;
    font-size: 12px;
    font-weight: 700;
    text-align: center;
    min-width: 100px;
    max-width: 150px;
  }
  .ll-box .sub { font-size: 9px; font-weight: 400; opacity: 0.7; margin-top: 2px; }

  .ll-1 .ll-box { background: #1e293b; border-color: #1e293b; color: #fff; }
  .ll-2 .ll-box { background: #64748b; border-color: #64748b; color: #fff; }
  .ll-3 .ll-box { background: #f97316; border-color: #f97316; color: #fff; }
  .ll-4 .ll-box { background: #ef4444; border-color: #ef4444; color: #fff; }
  .ll-5 .ll-box { background: #3b82f6; border-color: #3b82f6; color: #fff; }
  .ll-6 .ll-box { background: #22c55e; border-color: #22c55e; color: #fff; }
  .ll-7 .ll-box { background: #06b6d4; border-color: #06b6d4; color: #fff; }
  .ll-8 .ll-box { background: #a855f7; border-color: #a855f7; color: #fff; }
  .ll-9 .ll-box { background: #f59e0b; border-color: #f59e0b; color: #fff; }

  /* 生命线竖线 */
  .ll-lines {
    position: relative;
    height: 100%;
    display: flex;
    justify-content: space-between;
  }
  .ll-line {
    width: 2px;
    background: repeating-linear-gradient(
      to bottom,
      #cbd5e1 0, #cbd5e1 4px,
      transparent 4px, transparent 8px
    );
    margin: 0 auto;
  }

  /* 消息行 */
  .messages {
    position: relative;
    margin-top: 8px;
  }
  .msg {
    position: relative;
    height: 32px;
    display: flex;
    align-items: center;
  }
  .msg-arrow {
    position: absolute;
    height: 2px;
    top: 50%;
    transform: translateY(-50%);
  }
  .msg-arrow::after {
    content: '';
    position: absolute;
    right: -1px;
    top: 50%;
    transform: translateY(-50%);
    border-style: solid;
    border-width: 5px 0 5px 8px;
    border-color: transparent transparent transparent currentColor;
  }
  .msg-arrow.dashed {
    background: transparent;
    border-top: 2px dashed currentColor;
    height: 0;
  }
  .msg-arrow.dashed::after {
    border-color: transparent transparent transparent currentColor;
  }
  .msg-arrow.right::after {
    border-width: 5px 0 5px 8px;
    border-color: transparent transparent transparent currentColor;
  }
  .msg-arrow.left::after {
    right: auto;
    left: -1px;
    border-width: 5px 8px 5px 0;
    border-color: transparent currentColor transparent transparent;
  }
  .msg-label {
    position: absolute;
    top: -16px;
    font-size: 10px;
    font-weight: 600;
    white-space: nowrap;
    padding: 1px 6px;
    border-radius: 3px;
    background: #fff;
  }

  /* 激活条 */
  .activation {
    position: absolute;
    width: 8px;
    background: #e2e8f0;
    border: 1px solid #94a3b8;
    border-radius: 2px;
    top: 0;
    z-index: 1;
  }

  /* 自调用 */
  .self-call {
    position: absolute;
    width: 30px;
    height: 20px;
    border: 2px solid;
    border-left: none;
    border-radius: 0 6px 6px 0;
  }
  .self-call::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: -6px;
    border-style: solid;
    border-width: 4px 6px 4px 0;
    border-color: transparent currentColor transparent transparent;
  }

  /* 注释框 */
  .note-box {
    position: absolute;
    background: #fef3c7;
    border: 1px solid #fcd34d;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 10px;
    color: #92400e;
    max-width: 200px;
    line-height: 1.4;
    z-index: 2;
  }
  .note-box::before {
    content: '📝';
    margin-right: 3px;
  }

  /* 配色 */
  .c-slate { color: #64748b; }
  .c-orange { color: #f97316; }
  .c-red { color: #ef4444; }
  .c-blue { color: #3b82f6; }
  .c-green { color: #22c55e; }
  .c-cyan { color: #06b6d4; }
  .c-purple { color: #a855f7; }
  .c-amber { color: #f59e0b; }

  /* 图例 */
  .legend {
    display: flex;
    gap: 18px;
    justify-content: center;
    margin-top: 20px;
    font-size: 11px;
    color: #64748b;
    flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; border: 2px solid; }

  /* SVG 时序图 */
  .svg-seq {
    width: 100%;
    overflow: visible;
  }
</style>
</head>
<body>
<div class="diagram">
  <div class="title-main">模块交互时序图</div>
  <div class="subtitle">系统启动初始化 → HTTP 请求处理 → AMQP 数据消费 三阶段全链路</div>

  <!-- ========== 阶段 1：启动初始化 ========== -->
  <div class="phase">
    <div class="phase-tag p-init">阶段 1：系统启动初始化</div>
    <div class="phase-line"></div>
  </div>

  <svg class="svg-seq" viewBox="0 0 1120 310" preserveAspectRatio="xMinYMin meet">
    <!-- 生命线头部 -->
    <!-- 9 条生命线，均匀分布 -->
    <!-- positions: 60, 185, 310, 435, 560, 685, 810, 935, 1060 -->

    <!-- 生命线竖线 -->
    <line x1="60" y1="50" x2="60" y2="300" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="185" y1="50" x2="185" y2="300" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="310" y1="50" x2="310" y2="300" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="435" y1="50" x2="435" y2="300" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="560" y1="50" x2="560" y2="300" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="685" y1="50" x2="685" y2="300" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="810" y1="50" x2="810" y2="300" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="935" y1="50" x2="935" y2="300" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="1060" y1="50" x2="1060" y2="300" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>

    <!-- 头部方块 -->
    <rect x="10" y="10" width="100" height="36" rx="6" fill="#1e293b" stroke="#1e293b" stroke-width="2"/>
    <text x="60" y="27" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">SmartMushroom</text>
    <text x="60" y="40" text-anchor="middle" fill="#94a3b8" font-size="9">Application</text>

    <rect x="135" y="10" width="100" height="36" rx="6" fill="#64748b" stroke="#64748b" stroke-width="2"/>
    <text x="185" y="27" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Config 类组</text>
    <text x="185" y="40" text-anchor="middle" fill="#cbd5e1" font-size="9">Cors/WS/AppProp</text>

    <rect x="260" y="10" width="100" height="36" rx="6" fill="#f97316" stroke="#f97316" stroke-width="2"/>
    <text x="310" y="27" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">KingbaseConfig</text>
    <text x="310" y="40" text-anchor="middle" fill="#ffedd5" font-size="9">金仓数据源</text>

    <rect x="385" y="10" width="100" height="36" rx="6" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
    <text x="435" y="27" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">AuthService</text>
    <text x="435" y="40" text-anchor="middle" fill="#fee2e2" font-size="9">@PostConstruct</text>

    <rect x="510" y="10" width="100" height="36" rx="6" fill="#06b6d4" stroke="#06b6d4" stroke-width="2"/>
    <text x="560" y="27" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">DataConsumerMgr</text>
    <text x="560" y="40" text-anchor="middle" fill="#cffafe" font-size="9">@PostConstruct</text>

    <!-- 激活条 -->
    <rect x="181" y="70" width="8" height="40" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" rx="2"/>
    <rect x="306" y="80" width="8" height="30" fill="#ffedd5" stroke="#f97316" stroke-width="1" rx="2"/>
    <rect x="431" y="120" width="8" height="60" fill="#fee2e2" stroke="#ef4444" stroke-width="1" rx="2"/>
    <rect x="556" y="200" width="8" height="70" fill="#cffafe" stroke="#06b6d4" stroke-width="1" rx="2"/>

    <!-- 消息 1: Application → Config 类组 -->
    <line x1="64" y1="80" x2="181" y2="80" stroke="#64748b" stroke-width="2"/>
    <polygon points="181,80 173,76 173,84" fill="#64748b"/>
    <text x="122" y="74" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">扫描 @Configuration 初始化</text>

    <!-- 消息 2: Config → KingbaseConfig -->
    <line x1="193" y1="95" x2="306" y2="95" stroke="#f97316" stroke-width="2"/>
    <polygon points="306,95 298,91 298,99" fill="#f97316"/>
    <text x="250" y="89" text-anchor="middle" fill="#9a3412" font-size="10" font-weight="600">创建 kingbaseDataSource()</text>

    <!-- 注释: KingbaseConfig -->
    <rect x="240" y="105" width="160" height="14" rx="3" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
    <text x="320" y="115" text-anchor="middle" fill="#92400e" font-size="9">HikariCP + com.kingbase8.Driver</text>

    <!-- 消息 3: Application → AuthService @PostConstruct -->
    <line x1="64" y1="135" x2="431" y2="135" stroke="#ef4444" stroke-width="2"/>
    <polygon points="431,135 423,131 423,139" fill="#ef4444"/>
    <text x="248" y="129" text-anchor="middle" fill="#991b1b" font-size="10" font-weight="600">@PostConstruct initTable()</text>

    <!-- 消息 4: AuthService → KingbaseES (自调用样式的数据库操作) -->
    <line x1="439" y1="155" x2="510" y2="155" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3"/>
    <polygon points="431,155 439,151 439,159" fill="#ef4444"/>
    <text x="475" y="149" text-anchor="middle" fill="#991b1b" font-size="10" font-weight="600">CREATE TABLE IF NOT EXISTS users</text>

    <!-- 注释: 建表 + 初始化管理员 -->
    <rect x="400" y="165" width="200" height="14" rx="3" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
    <text x="500" y="175" text-anchor="middle" fill="#92400e" font-size="9">初始化默认管理员 admin / admin123 (BCrypt)</text>

    <!-- 消息 5: Application → DataConsumerMgr @PostConstruct -->
    <line x1="64" y1="215" x2="556" y2="215" stroke="#06b6d4" stroke-width="2"/>
    <polygon points="556,215 548,211 548,219" fill="#06b6d4"/>
    <text x="310" y="209" text-anchor="middle" fill="#155e75" font-size="10" font-weight="600">@PostConstruct start()</text>

    <!-- 消息 6: DataConsumerMgr → (启动数据源线程) -->
    <line x1="564" y1="240" x2="660" y2="240" stroke="#06b6d4" stroke-width="2"/>
    <polygon points="660,240 652,236 652,244" fill="#06b6d4"/>
    <text x="612" y="234" text-anchor="middle" fill="#155e75" font-size="10" font-weight="600">启动数据源线程</text>

    <!-- 注释: 数据源选择 -->
    <rect x="570" y="250" width="200" height="14" rx="3" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
    <text x="670" y="260" text-anchor="middle" fill="#92400e" font-size="9">根据 app.data-source 选择 AMQP / 模拟数据</text>

    <!-- 消息 7: 启动完成返回 -->
    <line x1="564" y1="280" x2="64" y2="280" stroke="#64748b" stroke-width="2" stroke-dasharray="5,3"/>
    <polygon points="64,280 72,276 72,284" fill="#64748b"/>
    <text x="314" y="274" text-anchor="middle" fill="#475569" font-size="10" font-weight="600">启动完成，进入就绪状态</text>

  </svg>

  <!-- ========== 阶段 2：HTTP 请求处理 ========== -->
  <div class="phase">
    <div class="phase-tag p-runtime">阶段 2：HTTP 请求处理（Controller → Service → Mapper）</div>
    <div class="phase-line"></div>
  </div>

  <svg class="svg-seq" viewBox="0 0 1120 240" preserveAspectRatio="xMinYMin meet">
    <!-- 生命线 -->
    <line x1="60" y1="50" x2="60" y2="220" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="310" y1="50" x2="310" y2="220" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="560" y1="50" x2="560" y2="220" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="810" y1="50" x2="810" y2="220" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="935" y1="50" x2="935" y2="220" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>

    <!-- 头部 -->
    <rect x="10" y="10" width="100" height="36" rx="6" fill="#3b82f6" stroke="#3b82f6" stroke-width="2"/>
    <text x="60" y="27" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">前端 (Vue)</text>
    <text x="60" y="40" text-anchor="middle" fill="#dbeafe" font-size="9">Axios + Token</text>

    <rect x="260" y="10" width="100" height="36" rx="6" fill="#f97316" stroke="#f97316" stroke-width="2"/>
    <text x="310" y="27" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Controller</text>
    <text x="310" y="40" text-anchor="middle" fill="#ffedd5" font-size="9">REST 接口</text>

    <rect x="510" y="10" width="100" height="36" rx="6" fill="#22c55e" stroke="#22c55e" stroke-width="2"/>
    <text x="560" y="27" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Service</text>
    <text x="560" y="40" text-anchor="middle" fill="#dcfce7" font-size="9">业务逻辑</text>

    <rect x="760" y="10" width="100" height="36" rx="6" fill="#a855f7" stroke="#a855f7" stroke-width="2"/>
    <text x="810" y="27" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Mapper</text>
    <text x="810" y="40" text-anchor="middle" fill="#f3e8ff" font-size="9">MyBatis-Plus</text>

    <rect x="885" y="10" width="100" height="36" rx="6" fill="#f59e0b" stroke="#f59e0b" stroke-width="2"/>
    <text x="935" y="27" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">SQLite</text>
    <text x="935" y="40" text-anchor="middle" fill="#fef3c7" font-size="9">业务数据源</text>

    <!-- 激活条 -->
    <rect x="306" y="75" width="8" height="90" fill="#ffedd5" stroke="#f97316" stroke-width="1" rx="2"/>
    <rect x="556" y="95" width="8" height="50" fill="#dcfce7" stroke="#22c55e" stroke-width="1" rx="2"/>
    <rect x="806" y="110" width="8" height="20" fill="#f3e8ff" stroke="#a855f7" stroke-width="1" rx="2"/>

    <!-- 消息 1: 前端 → Controller -->
    <line x1="64" y1="85" x2="306" y2="85" stroke="#3b82f6" stroke-width="2"/>
    <polygon points="306,85 298,81 298,89" fill="#3b82f6"/>
    <text x="185" y="79" text-anchor="middle" fill="#1e40af" font-size="10" font-weight="600">REST 请求 (Authorization: Bearer {token})</text>

    <!-- 消息 2: Controller → Service -->
    <line x1="314" y1="105" x2="556" y2="105" stroke="#22c55e" stroke-width="2"/>
    <polygon points="556,105 548,101 548,109" fill="#22c55e"/>
    <text x="435" y="99" text-anchor="middle" fill="#166534" font-size="10" font-weight="600">调用 Service 方法</text>

    <!-- 消息 3: Service → Mapper -->
    <line x1="564" y1="120" x2="806" y2="120" stroke="#a855f7" stroke-width="2"/>
    <polygon points="806,120 798,116 798,124" fill="#a855f7"/>

    <!-- 消息 4: Mapper → SQLite -->

    <!-- 消息 5: SQLite → Mapper (返回) -->
    <line x1="931" y1="145" x2="814" y2="145" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,3"/>
    <polygon points="806,145 814,141 814,149" fill="#f59e0b"/>

    <line x1="556" y1="165" x2="314" y2="165" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,3"/>

    <!-- 消息 7: Controller → 前端 (返回) -->

    <polygon points="64,185 72,181 72,189" fill="#3b82f6"/>
    <text x="185" y="179" text-anchor="middle" fill="#1e40af" font-size="10" font-weight="600">ApiResponse (code=0, data=...)</text>

    <!-- 注释 -->
    <rect x="180" y="200" width="500" height="20" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="430" y="214" text-anchor="middle" fill="#475569" font-size="10">三层架构：Controller 校验参数 + 封装响应 → Service 业务逻辑 → Mapper MyBatis-Plus ORM</text>
  </svg>

  <!-- ========== 阶段 3：AMQP 数据消费 ========== -->
  <div class="phase">
    <div class="phase-tag p-data">阶段 3：AMQP 数据消费与实时推送</div>
    <div class="phase-line"></div>
  </div>

  <svg class="svg-seq" viewBox="0 0 1120 310" preserveAspectRatio="xMinYMin meet">
    <!-- 生命线 -->
    <line x1="60" y1="50" x2="60" y2="290" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="185" y1="50" x2="185" y2="290" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="370" y1="50" x2="370" y2="290" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="560" y1="50" x2="560" y2="290" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="750" y1="50" x2="750" y2="290" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>
    <line x1="935" y1="50" x2="935" y2="290" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,4"/>
